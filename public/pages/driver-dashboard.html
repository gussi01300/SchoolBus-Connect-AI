<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Dashboard - Bus <span id="busNumber">---</span></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 24px;
      color: #00d4ff;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.connected {
      background: #00ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .location-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      border-radius: 26px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .toggle-slider {
      background-color: #00d4ff;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }
    .next-stop-card {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 20px;
      border: 2px solid #00d4ff;
    }
    .next-stop-label {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .next-stop-address {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #fff;
    }
    .next-stop-meta {
      font-size: 14px;
      color: #00d4ff;
      margin-bottom: 20px;
    }
    .pickup-btn {
      width: 100%;
      min-height: 80px;
      font-size: 24px;
      font-weight: bold;
      background: #00ff88;
      color: #1a1a2e;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .pickup-btn:hover {
      background: #00cc6a;
      transform: scale(1.02);
    }
    .pickup-btn:active {
      transform: scale(0.98);
    }
    .pickup-btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }
    .students-count {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #888;
    }
    .other-stops {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .other-stops h3 {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
    .stop-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #0f3460;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .stop-item:last-child {
      margin-bottom: 0;
    }
    .stop-name {
      font-weight: 500;
    }
    .student-badge {
      background: #e94560;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
    }
    .secondary-btn {
      flex: 1;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .secondary-btn:hover {
      background: #c73e54;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .error {
      background: #e94560;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    .fallback-notice {
      background: #ff9800;
      color: #1a1a2e;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Bus <span id="busNumber">---</span></h1>
    </div>

    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
      </div>
      <div class="location-toggle">
        <span>Share Location</span>
        <label class="toggle-switch">
          <input type="checkbox" id="locationToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div id="errorContainer"></div>
    <div id="fallbackNotice" class="fallback-notice" style="display: none;">
      Using fallback location (live tracking unavailable)
    </div>

    <div class="next-stop-card">
      <div class="next-stop-label">Next Stop</div>
      <div class="next-stop-address" id="nextStopAddress">Loading...</div>
      <div class="next-stop-meta" id="nextStopMeta">---</div>
      <button class="pickup-btn" id="pickupBtn" onclick="markPickup()">
        Picked Up
      </button>
      <div class="students-count" id="studentsCount"></div>
    </div>

    <div class="other-stops">
      <h3>Remaining Stops</h3>
      <div id="otherStopsList">Loading...</div>
    </div>

    <div class="action-buttons">
      <button class="secondary-btn" onclick="endShift()">End Shift</button>
    </div>
  </div>

  <script>
    const busNumberEl = document.getElementById('busNumber');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const locationToggle = document.getElementById('locationToggle');
    const nextStopAddress = document.getElementById('nextStopAddress');
    const nextStopMeta = document.getElementById('nextStopMeta');
    const pickupBtn = document.getElementById('pickupBtn');
    const studentsCount = document.getElementById('studentsCount');
    const otherStopsList = document.getElementById('otherStopsList');
    const errorContainer = document.getElementById('errorContainer');
    const fallbackNotice = document.getElementById('fallbackNotice');

    let watchId = null;
    let locationEnabled = true;
    let currentStopId = null;
    let updateInterval = null;

    async function checkLoginStatus() {
      try {
        const res = await fetch('/api/driver/loginStatus', { credentials: 'include' });
        if (!res.ok) {
          window.location.href = '/pages/driver_login.html';
          return false;
        }
        const data = await res.json();
        busNumberEl.textContent = '---';
        return true;
      } catch (e) {
        window.location.href = '/pages/driver_login.html';
        return false;
      }
    }

    async function loadNextStop() {
      try {
        const res = await fetch('/api/driver/next-stop', { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to load next stop');
        const data = await res.json();

        currentStopId = data.stop.id;
        nextStopAddress.textContent = data.stop.address;
        nextStopMeta.textContent = `${data.stop.stop_name}`;
        studentsCount.textContent = data.studentsWaiting > 0
          ? `${data.studentsWaiting} student${data.studentsWaiting > 1 ? 's' : ''} waiting`
          : 'No students waiting';

        if (data.studentsWaiting === 0) {
          pickupBtn.textContent = 'No Students - Continue';
          pickupBtn.style.background = '#00d4ff';
        } else {
          pickupBtn.textContent = 'Picked Up';
          pickupBtn.style.background = '#00ff88';
        }
      } catch (e) {
        nextStopAddress.textContent = 'No more stops today';
        nextStopMeta.textContent = 'Route complete';
        pickupBtn.style.display = 'none';
        studentsCount.textContent = '';
      }
    }

    async function loadOtherStops() {
      // For now, just show placeholder - could be enhanced to show full route
      otherStopsList.innerHTML = '<div style="color: #888; padding: 10px;">No remaining stops</div>';
    }

    async function markPickup() {
      if (!currentStopId) return;

      pickupBtn.disabled = true;
      pickupBtn.textContent = 'Processing...';

      try {
        const res = await fetch('/api/driver/pickup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ stopId: currentStopId })
        });

        if (res.ok) {
          const data = await res.json();
          alert(`Marked ${data.count} student${data.count !== 1 ? 's' : ''} as picked up`);
          loadNextStop();
        } else {
          throw new Error('Failed to mark pickup');
        }
      } catch (e) {
        alert('Error marking pickup: ' + e.message);
      } finally {
        pickupBtn.disabled = false;
      }
    }

    function startLocationTracking() {
      if (!navigator.geolocation) {
        showFallbackNotice();
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          hideFallbackNotice();
          sendLocation(position.coords.latitude, position.coords.longitude, 'geolocation');
        },
        (error) => {
          console.warn('Geolocation error:', error.message);
          useFallbackLocation();
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 30000
        }
      );
    }

    function sendLocation(lat, lon, source) {
      fetch('/api/driver/location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ latitude: lat, longitude: lon, source })
      }).catch(e => console.warn('Failed to send location:', e));
    }

    function useFallbackLocation() {
      // Use last known position or current stop coordinates
      showFallbackNotice();
      // Send a fallback ping every 30s
      sendLocation(0, 0, 'fallback');
    }

    function showFallbackNotice() {
      fallbackNotice.style.display = 'block';
    }

    function hideFallbackNotice() {
      fallbackNotice.style.display = 'none';
    }

    function stopLocationTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }
    }

    function endShift() {
      stopLocationTracking();
      fetch('/api/driver/logout', {
        method: 'POST',
        credentials: 'include'
      }).then(() => {
        window.location.href = '/pages/driver_login.html';
      });
    }

    locationToggle.addEventListener('change', () => {
      locationEnabled = locationToggle.checked;
      if (locationEnabled) {
        startLocationTracking();
      } else {
        stopLocationTracking();
      }
    });

    async function init() {
      if (!await checkLoginStatus()) return;

      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';

      await loadNextStop();
      await loadOtherStops();

      if (locationEnabled) {
        startLocationTracking();
      }
    }

    init();
  </script>
</body>
</html>
